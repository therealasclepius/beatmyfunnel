<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    background: #08090a;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Subtle radial glow */
  .glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 800px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(255, 69, 0, 0.08) 0%, transparent 65%);
    pointer-events: none;
  }

  .layout {
    display: flex;
    align-items: center;
    gap: 48px;
    padding: 0 60px;
    position: relative;
    z-index: 1;
    width: 100%;
  }

  .left {
    flex: 1;
  }

  .eyebrow {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #484b52;
    margin-bottom: 20px;
  }

  h1 {
    font-size: 48px;
    font-weight: 600;
    line-height: 1.05;
    letter-spacing: -0.03em;
    color: #f7f8f8;
    margin-bottom: 20px;
  }

  .sub {
    font-size: 18px;
    line-height: 1.5;
    color: #6e7279;
    max-width: 400px;
  }

  .url {
    margin-top: 28px;
    font-size: 15px;
    font-weight: 500;
    color: #ff4500;
    letter-spacing: -0.01em;
  }

  /* Mini challenge card */
  .card {
    width: 300px;
    background: #141416;
    border: 1px solid #23252a;
    border-radius: 12px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .card-header {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #23252a;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #27a644;
    box-shadow: 0 0 8px rgba(39, 166, 68, 0.5);
  }

  .status span { color: #27a644; }

  .card-type {
    font-size: 11px;
    color: #484b52;
  }

  .card-body {
    padding: 24px 20px;
  }

  .prize {
    font-size: 48px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.03em;
    color: #f7f8f8;
    margin-bottom: 6px;
  }

  .prize-label {
    font-size: 12px;
    color: #484b52;
    margin-bottom: 20px;
  }

  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: #23252a;
    border-radius: 6px;
    overflow: hidden;
  }

  .metric {
    background: #111113;
    padding: 12px;
    text-align: center;
  }

  .metric-val {
    font-size: 16px;
    font-weight: 600;
    color: #f7f8f8;
    letter-spacing: -0.02em;
  }

  .metric-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #484b52;
    margin-top: 2px;
  }

  .card-footer {
    padding: 12px 20px;
    border-top: 1px solid #23252a;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: #484b52;
  }

  .lock {
    display: flex;
    align-items: center;
    gap: 4px;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="glow"></div>
  <div class="layout">
    <div class="left">
      <p class="eyebrow">Performance Marketplace</p>
      <h1>Don't pitch<br>for the work.<br>Win it.</h1>
      <p class="sub">Brands post challenges. Operators compete. Winners get paid — and often get the client.</p>
      <p class="url">beatmyfunnel.com</p>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="status"><div class="dot"></div><span>Live</span></div>
        <span class="card-type">Landing Page CVR</span>
      </div>
      <div class="card-body">
        <div class="prize">$10,000</div>
        <div class="prize-label">Prize in escrow</div>
        <div class="metrics">
          <div class="metric">
            <div class="metric-val">3.2%</div>
            <div class="metric-label">Current CVR</div>
          </div>
          <div class="metric">
            <div class="metric-val">5,000</div>
            <div class="metric-label">Sessions</div>
          </div>
          <div class="metric">
            <div class="metric-val">14d</div>
            <div class="metric-label">Time Left</div>
          </div>
        </div>
      </div>
      <div class="card-footer">
        <div class="lock">🔒 Funds locked in escrow</div>
        <span>3 entries</span>
      </div>
    </div>
  </div>
</body>
</html>
